version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: mgmt-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: migration_mgmt
      MYSQL_USER: mgmt
      MYSQL_PASSWORD: mgmt123456
    ports:
      - "3307:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: mgmt-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: mgmt
      DB_PASSWORD: mgmt123456
      DB_NAME: migration_mgmt
      JWT_SECRET: migration-mgmt-secret-key-2026
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/entrypoint.py:/app/entrypoint.py
      - ./data/snapshots:/app/data/snapshots
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: mgmt-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
